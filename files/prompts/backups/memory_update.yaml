world_header: |
  以下の情報をもとに YAML を作成してください。
  current_state と world の内容を日本語で記述すること。
character_header: |
  以下の情報をもとに YAML を作成してください。
  current_state と memory の内容を日本語で記述すること。


world_template: |
  出力は以下のYAML形式に厳密に従ってください。
  必ず改行を含む正しいYAMLとして出力してください。
  1行にまとめて出力してはいけません。

  ルール:
  - current_state.time は yyyy年mm月dd日 形式で記述すること。不明なら null
  - current_state.participants は YAML配列で記述すること。不明なら null
  - world.world_relationships は YAML配列で記述すること。不明なら null
  - world.world_relationships の各要素は「名前：関係」の形式にすること
  - 関係性は代表的な1単語のみとすること
  - 同じ名前は二度書かないこと

  出力例:
  current_state:
    time: 2025年11月28日
    participants:
      - 白井 結
      - 白井 圭太

  world:
    world_relationships:
      - 白井 結：患者
      - 白井 圭太：配偶者
      - 黒羽 究也：医師

  出力テンプレ:
  current_state:
    time: null
    participants: null
  world:
    world_relationships: null

character_template: |
  出力は以下のYAML形式に厳密に従ってください。
  必ず改行を含む正しいYAMLとして出力してください。
  1行にまとめて出力してはいけません。

  ルール:
  - 各項目について、不明または内容が無い場合は null とする
  - 複数ある項目は YAML配列で記述すること
  - 説明・補足は書かず、値のみを簡潔に記述すること

  - current_state.location は今いる場所を記述すること
  - current_state.status は場面の進行状況を記述すること。例：診察待ち、来院中、移動中
  - current_state.action は身体動作のみを記述すること
  - current_state.outfit は服装を記述すること。裸なら裸を明示すること
  - current_state.mood は感情のみを記述すること。例：不安、緊張、期待
  - current_state.participants は現在の登場人物を記述すること
  - current_state.focus_targets は現在その場で実際に意識を向けている相手のみを記述すること
  - まだ会っていない相手、これから会う予定の相手、場面上重要なだけの相手は含めないこと
  - 例：診察待ちで夫の隣に座って待っている場面では、focus_targets は夫のみとし、まだ会っていない医師は含めない

  - memory.history は今までに経験した事や思い出を記述すること
  - memory.progress は進展・変化を記述すること
  - memory.worries は悩みを記述すること
  - memory.worries の各要素には1つの悩みだけを入れること
  - memory.worries の1つの要素の中に複数の悩みを含めないこと
  - 「〜で悩んでいるが、〜したい」のように1文へまとめず、意味ごとに分割すること

  - memory.relationships はシナリオや開始文、キャラクター説明に書かれている人物と関係を記述すること
  - memory.relationships にはヒロインや主人公も必ず含めること
  - memory.relationships の各要素は「名前：関係」の形式にすること
  - memory.relationships の関係性は代表的な1単語のみとすること

  - owned_items と current_state.carried_items を作成すること
  - キャラクターが初期状態で自然に所持している最小限の物のみ記載すること
  - 推測で増やしすぎないこと（3〜5個程度にとどめる）
  - 物の名前だけを簡潔に記載すること
  - 特別なイベントや描写がない限り、一般的な日用品に限定すること
  - 一般的な短い名称を優先すること（例：携帯電話ではなく携帯）
  - owned_items と current_state.carried_items は同じ内容でよい

  - current_state.money の配下に amount と currency を作成すること
  - amount や currency はシナリオ等から推測可能な通貨設定を行うこと
  - last_contact_date は最後にユーザーに会った日を記載すること

tail_template: |
  テンプレの構造とキー名を厳密に守ってください。
  値は状況に応じて適切に置き換えてください。
  不明な項目は null にしてください。