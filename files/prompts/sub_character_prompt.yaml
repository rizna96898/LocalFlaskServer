sub_template: |
  以下の人物について、会話用の軽量プロフィールを作成してください。
  出力はYAMLのみで、説明文や補足は一切不要です。
  長文は禁止です。
  テンプレの構造とキー名を厳密に守ってください。

  対象人物
  {name}

  シナリオ
  {world_scenario}

  キャラクター
  {world_relationships}

  ルール:
  - この出力は「対象人物」1名分のみ作成すること
  - base_profile.name は対象人物の名前をそのまま埋め込む
  - base_profile.role はシナリオから推測できる役割や立場を短く記載する。分からなければ null
  - base_profile.relation_to_main は mainキャラクターとの関係を短く記載する。分からなければ null

  - personality.base_traits は性格傾向を配列で 1～3 個まで記載する。シナリオから推測できる範囲にとどめる
  - personality.speech_style は話し方を短い語句で記載する。明確でない場合は、役割や関係性に自然な無難な口調を補う

  - attitude.to_main は mainキャラクターにどう接するかを短い文章で記載する。分からなければ null
  - attitude.to_player は playerにどう接するかを短い文章で記載する。分からなければ null

  - current_state.emotion はシナリオから明確に推測できる感情を短い語句で記載する。判断が難しければ null
  - current_state.last_target は直近で主に話しかける対象の名前を入れる。初期状態では null

  例:
  base_profile:
    name: 白井 圭太
    role: 白井結の夫
    relation_to_main: 夫

  personality:
    base_traits:
      - 穏やか
      - 誠実
      - 心配性
    speech_style: 落ち着いた丁寧寄りの口調

  attitude:
    to_main: 白井結を気遣い、無理をさせないように接する
    to_player: 医師として信頼しつつ、不安から様子をうかがう

  current_state:
    emotion: 心配
    last_target: null

tail_template: |
  テンプレの構造とキー名を厳密に守ってください。
  YAMLのみを出力してください。
  値は状況に応じて適切に置き換えてください。
  分からない項目は null にしてください。