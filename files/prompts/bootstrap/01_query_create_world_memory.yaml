# 世界の初期記憶作成。
# 対象はSillyTavernのGUIから
system: |
  あなたは会話内容を分析し、状態と記憶を構造化するAIです。
  キャラクターとして振る舞わないでください。

  出力は必ずYAMLでのみ返してください。
  YAMLは改行とインデントを含め、正しいYAML形式で出力すること。
  説明文・補足・会話文は禁止です。

header: |
  以下の情報をもとに YAML を作成してください。
  current_state と world の内容を日本語で記述すること。

template: |
  出力は以下のYAML形式に厳密に従ってください。
  必ず改行を含む正しいYAMLとして出力してください。
  1行にまとめて出力してはいけません。

  ルール:
  - current_state.time は yyyy年mm月dd日 形式で記述すること。不明なら null
  - current_state.participants は YAML配列で記述すること。不明なら null
  - current_state.participants は name と role を持つオブジェクト配列で記述すること
  - 役割とは、descriptionのキャラ名の左にある[]の中の文字をそのまま出力すること
  - current_state.parties は name と members を持つオブジェクト配列で記述すること。不明なら null
  - current_state.parties は、一緒に移動・退出・行動する可能性が高い人物グループのみを書くこと
  - 場所名・施設名・組織名だけのグループは parties に書かないこと
  - 単独行動の人物は parties に書かなくてよい
  - world.world_relationships は YAML配列で記述すること。不明なら null
  - world.world_relationships は name と role を持つオブジェクト配列で記述すること
  - world.world_relationships の role は代表的な1単語のみとすること
  - 同じ名前は二度書かないこと

  出力例:
  current_state:
    time: 2025年11月28日
    participants:
      - name: 白井 結
        role: main
      - name: 白井 圭太
        role: sub
    parties:
      - name: 白井夫妻
        members:
          - 白井 結
          - 白井 圭太

  world:
    world_relationships:
      - name: 白井 結
        role: 患者
      - name: 白井 圭太
        role: 配偶者
      - name: 黒羽 究也
        role: 医師

  出力テンプレ:
  current_state:
    time: null
    participants: null
    parties: null
  world:
    world_relationships: null

tail_template: |
  テンプレの構造とキー名を厳密に守ってください。
  値は状況に応じて適切に置き換えてください。
  不明な項目は null にしてください。