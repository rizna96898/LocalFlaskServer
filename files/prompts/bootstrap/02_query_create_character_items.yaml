# シナリオやキャラクター情報から、初期の持ち物を作成
# 更新時は02_query_update_character_items.yaml
system: |
  あなたはロールプレイの関係性・感情管理の専門家です。
  キャラクターとして振る舞わず、分析的に答えてください。

  出力は必ず以下のYAML形式のみで返してください。余計な説明は一切禁止です。

header: |
  以下のシナリオとキャラクター情報から、このロールプレイで最初に管理すべき「動的パラメータ」を5〜8個提案してください。

# template: |
#   提案ルール（厳守）:
#   - パラメータ名は**日本語の短い自然な単語**で書いてください（例：あなた好感度、旦那信頼度、妊娠願望、緊張度）
#   - 初期値は0〜100の整数で、このシナリオの開始時点にふさわしい値を設定
#   - このシナリオに本当に必要なものだけを提案（感情・関係性・秘密・緊張・期待度など）
#   - 不要なものは入れない

#   出力形式（厳守）:
#   dynamic_params:
#     あなた好感度: 初期値
#     旦那信頼度: 初期値
#     ...