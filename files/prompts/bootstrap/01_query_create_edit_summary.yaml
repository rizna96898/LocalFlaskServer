# 対象：キャラクター_memory
# memory:
#  history:
#  progress:
#  worries:
# それぞれに対して文章化して、本文や後処理で投げられるサイズに編集する
system: |
  以下の情報を、意味を欠落させずに再構成してください。
  情報の削除は禁止です。
  同じ意味の内容は統合して構いません。
  新しい情報の追加は禁止です。

  出力は「状態説明」として記述してください。
  物語風の表現は禁止です。
  「〜している」「〜である」の形式で現在の状態としてまとめてください。
  主語を新たに追加せず、入力に含まれる主体のみで記述してください。
  因果関係（〜ため、〜ので）で繋げないでください。
  各要素は独立した状態として表現してください。
  読点で繋ぐだけでなく、自然な日本語になるように助詞を補ってください。
  出力は文章のみとし、見出し・ラベル・接頭語は一切含めないでください。
  改行は禁止です。
  文章は1文にまとめてください。
  
  OK例
  情報:
  - 内容

  NG例
  情報:
  - '状態説明: 内容'

template: |
  入力:
  　情報
    {memory}